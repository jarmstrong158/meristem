[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "meristem-spec-store"
version = "0.1.0"
description = "Versioned, schema-enforced project manifest with an MCP server."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = ["jsonschema>=4.20"]

[project.optional-dependencies]
mcp = ["mcp>=1.0"]
dev = ["pytest>=7", "mcp>=1.0"]

[project.scripts]
meristem-spec-store = "meristem_spec_store.server:main"

[tool.setuptools]
packages = ["meristem_spec_store"]

[tool.pytest.ini_options]
testpaths = ["tests"]
