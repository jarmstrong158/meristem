[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "meristem-generators"
version = "0.1.0"
description = "Pluggable asset generator backends behind generate(spec, contract) -> Image."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
dependencies = ["Pillow>=10", "numpy>=1.24"]

[project.optional-dependencies]
dev = ["pytest>=7", "meristem-asset-gate"]

[tool.setuptools]
packages = ["meristem_generators"]

[tool.pytest.ini_options]
testpaths = ["tests"]
